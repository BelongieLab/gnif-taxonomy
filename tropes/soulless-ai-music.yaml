# GNIF Trope Concept: Soulless AI Music
$schema: "https://raw.githubusercontent.com/BelongieLab/gnif-taxonomy/main/schemas/trope-schema-v1.1.0.json"

tropeID: "gnif:trope:belongielab:SoullessAIMusic"
prefLabel: "Soulless AI Music"
altLabels:
  - "AI music is soul-sucking"
  - "Algorithmic noise"
  - "The death of human expression"

definition: >
  The aesthetic critique that music generated by artificial intelligence lacks genuine human emotion, intent, soul, and lived experience, rendering it empty corporate commodity.

description: >
  A fixture of artistic community statements, music reviews, and creative advocacy. It establishes a hard line between technical mimicry and human expression, arguing that even if an AI generation is mathematically or syntactically perfect, it remains fundamentally hollow and offensive to the spirit of art.

relationships:
  parentTrope: "gnif:trope:belongielab:ArtisticExceptionalism"
  relatedTropes:
    - "gnif:trope:belongielab:SlopContent"
    - "gnif:trope:belongielab:ForcedAIIntegration"
